<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Untuk Kamu 🤍</title>

  <link rel="stylesheet"
  href="style.css">
</head>
<body>

<!-- AUDIO -->

<audio id="music" loop>
  <source src="svg.mp3"
  type="audio/mpeg">
</audio>

<!-- INTRO -->

<div id="intro"
class="page active">

  <img src="Image1.jpg"
  class="bg-image">

  <div class="dark"></div>

  <div class="center">

    <div id="openBtn"
    class="love-btn">

      🤍

    </div>

    <h1>
      Tap Untuk Membuka
    </h1>

  </div>

</div>

<!-- MAIN -->

<div id="main"
class="page">

  <img src="Image2.jpg"
  class="bg-image">

  <div class="dark"></div>

  <div class="center content">

    <img src="Image3.jpg"
    class="profile">

    <h1 id="typing"></h1>

    <p>

      Maaf ya sayang...
      Aku sadar hari ini aku terlalu childish.
      Terima kasih karena masih sabar sama aku.
      Aku sayang banget sama kamu 🤍

    </p>

    <button id="galleryBtn">

      Lihat Kenangan 🤍

    </button>

  </div>

</div>

<!-- GALLERY -->

<div id="gallery"
class="page">

  <div class="progress">

    <div id="progressBar"></div>

  </div>

  <img id="galleryImage"
  src="Image1.jpg">

</div>

<!-- END -->

<div id="ending"
class="page">

  <img src="Image6.jpg"
  class="bg-image">

  <div class="dark"></div>

  <div class="center">

    <h1>
      I Love You 🤍
    </h1>

    <p>
      Terima kasih sudah bertahan
      sejauh ini 🤍
    </p>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
