<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Buat Sayang 🤍</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- MUSIC -->

<audio id="music" loop>

  <source src="svg.mp3"
  type="audio/mpeg">

</audio>

<!-- INTRO -->

<section class="screen intro"
id="intro">

  <div class="overlay"></div>

  <div class="intro-content">

    <div class="heart"
    onclick="openPage()">

      🤍

    </div>

    <h1>
      Tap Disini
    </h1>

  </div>

</section>

<!-- MAIN -->

<section class="screen hidden"
id="main">

  <div class="bg"></div>

  <div class="content">

    <img src="Image1.jpg"
    class="profile">

    <h1 id="typing"></h1>

    <p>

      Maaf ya sayang...
      Aku sadar hari ini aku terlalu tantrum.
      Padahal kamu juga lagi capek.
      Terima kasih karena baik dan sabar sama aku.
      Aku sayang banget sama kamu 🤍

    </p>

    <button onclick="startGallery()">

      Cantikkuuu 🤍

    </button>

  </div>

</section>

<!-- GALLERY -->

<section class="screen hidden"
id="gallery">

  <div class="progress">

    <div class="bar"
    id="bar"></div>

  </div>

  <img id="slide"
  src="Image1.jpg">

</section>

<!-- ENDING -->

<section class="screen hidden"
id="ending">

  <div class="overlay"></div>

  <div class="ending-content">

    <h1>
      I Love You 🤍
    </h1>

    <p>
      Terima kasih sudah bertahan
      sejauh ini 🤍
    </p>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
