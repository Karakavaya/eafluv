<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Buat Sayang 🤍</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="svg.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<section class="page intro" id="intro">

  <div class="bg-dark"></div>

  <div class="letter-wrapper">

    <div class="envelope-area"
    id="openLetter">

      <div class="envelope">

        <div class="heart">
          🤍
        </div>

      </div>

      <p>Buka ya Sayang</p>

    </div>

  </div>

</section>

<!-- HERO -->
<section class="page hero hidden"
id="mainPage">

  <div class="overlay"></div>

  <div class="hero-content">

    <img src="Image2.jpg"
    class="profile">

    <h1 id="typing"></h1>

    <p class="message">

      Maaf ya sayang...
      Aku sadar aku terlalu tantrum hari ini.
      Padahal kamu juga lagi capek.
      Terima kasih karena sudah baik dan sabar.
      Aku belajar buat jadi lebih baik lagi.
      Aku sayang banget sama kamu 🤍

    </p>

    <button class="main-btn"
    onclick="showGallery()">

      Cintakuuuu 🤍

    </button>

  </div>

</section>

<!-- GALLERY -->
<section class="page gallery-page hidden"
id="galleryPage">

  <div class="story-progress">

    <div class="progress-bar"
    id="progressBar"></div>

  </div>

  <h2 class="gallery-title">
    Kesayangan Akuuuu 🤍
  </h2>

  <div class="photo-container">

    <img id="galleryImage"
    src="Image1.jpg">

  </div>

</section>

<!-- ENDING -->
<section class="page ending hidden"
id="endingPage">

  <div class="ending-content">

    <h1>I Love You 🤍</h1>

    <p>
      Terima kasih sudah bertahan
      sejauh ini 🤍
    </p>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
